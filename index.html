<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="eazip.ch — zip and protect your files with a password, right in your browser. Nothing is uploaded anywhere." />
    <meta name="theme-color" content="#0a0a0a" />
    <title>eazip.ch — Zip it. Lock it. Send it.</title>
    <script>
      // Apply theme before paint to avoid flash
      (function () {
        try {
          const saved = localStorage.getItem('eazip-theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const dark = saved ? saved === 'dark' : prefersDark;
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
