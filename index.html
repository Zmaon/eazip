<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>eazip.ch - Password-protected ZIPs in your browser</title>
    <meta name="description" content="Create password-protected ZIP files right in your browser. AES-256 encryption, dark/light mode, English / French / German / Italian. Nothing is uploaded: your files never leave your device." />

    <link rel="canonical" href="https://eazip.ch/" />
    <link rel="alternate" hreflang="en" href="https://eazip.ch/" />
    <link rel="alternate" hreflang="fr" href="https://eazip.ch/?lang=fr" />
    <link rel="alternate" hreflang="de" href="https://eazip.ch/?lang=de" />
    <link rel="alternate" hreflang="it" href="https://eazip.ch/?lang=it" />
    <link rel="alternate" hreflang="x-default" href="https://eazip.ch/" />

    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="eazip.ch" />
    <meta property="og:url" content="https://eazip.ch/" />
    <meta property="og:title" content="eazip.ch - Password-protected ZIPs in your browser" />
    <meta property="og:description" content="Create password-protected ZIP files right in your browser. AES-256, free, no upload, no account." />
    <meta property="og:image" content="https://eazip.ch/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="eazip - Zip it. Lock it. Send it." />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_CH" />
    <meta property="og:locale:alternate" content="de_CH" />
    <meta property="og:locale:alternate" content="it_CH" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="eazip.ch - Password-protected ZIPs in your browser" />
    <meta name="twitter:description" content="Create password-protected ZIP files right in your browser. AES-256, free, no upload, no account." />
    <meta name="twitter:image" content="https://eazip.ch/og-image.svg" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "eazip.ch",
        "alternateName": "eazip",
        "url": "https://eazip.ch/",
        "description": "Create password-protected ZIP files right in your browser. Files never leave your device.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript and a modern browser.",
        "inLanguage": ["en", "fr", "de", "it"],
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "CHF" },
        "featureList": [
          "AES-256 encrypted ZIP archives",
          "Classic ZipCrypto for maximum compatibility",
          "No upload: runs entirely in the browser",
          "Diceware passphrase generator",
          "Streams large archives to disk"
        ]
      }
    </script>
    <script>
      // Apply theme before paint to avoid flash
      (function () {
        try {
          const saved = localStorage.getItem('eazip-theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const dark = saved ? saved === 'dark' : prefersDark;
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
